<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Detour — rounded teal tile with a stepped right-angle arrow (road-sign style) -->
  <rect x="0" y="0" width="128" height="128" rx="26" ry="26" fill="#2A7598"/>
  <!-- Stepped detour path: enters bottom-left, turns up, turns right, exits with arrowhead -->
  <path d="M 22 92 L 60 92 L 60 44 L 92 44"
        fill="none" stroke="#FFFFFF" stroke-width="12"
        stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Arrowhead pointing right -->
  <path d="M 86 28 L 108 44 L 86 60 Z" fill="#FFFFFF"/>
</svg>

